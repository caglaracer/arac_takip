
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.dash{padding:1rem 0}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin:1.5rem 0 .75rem}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem}
.card .label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.card .val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.card .sub{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1rem}
.chart-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
.chart-box.full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.alert-box{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:.75rem 1rem;margin-bottom:.5rem}
.alert-box .at{font-size:13px;font-weight:500;color:var(--color-text-warning)}
.alert-box .ad{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.filter-row select{font-size:13px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.filter-row label{font-size:13px;color:var(--color-text-secondary)}
</style>

const COLORS = {
  "Çağrı Deniz": "#3266ad",
  "Serkan Ünal": "#1d9e75",
  "06 BFK 860": "#5a3ab7",
  "06 BOS 072": "#d85a30",
};

let charts = {};

function filtered(){
  const p = document.getElementById("filterPlaka").value;
  const s = document.getElementById("filterSurucu").value;
  return RAW.filter(r => (p==="all"||r.plaka===p) && (s==="all"||r.surucu===s));
}

function render(){
  const data = filtered();
  renderCards(data);
  renderGunluk(data);
  renderSurucu(data);
  renderAmac(data);
  renderOrtalama(data);
  renderAlerts();
}

function renderCards(data){
  const totalKm = data.reduce((a,r)=>a+r.km,0);
  const sefer = data.length;
  const ortKm = sefer ? Math.round(totalKm/sefer) : 0;
  const amacsiz = data.filter(r=>!r.amac||r.amac.trim()==="").length;
  document.getElementById("cards").innerHTML = `
    <div class="card"><div class="label">Toplam km</div><div class="val">${totalKm.toLocaleString('tr')}</div><div class="sub">${sefer} sefer</div></div>
    <div class="card"><div class="label">Ortalama sefer km</div><div class="val">${ortKm}</div><div class="sub">km/sefer</div></div>
    <div class="card"><div class="label">Günlük ort. km</div><div class="val">${Math.round(totalKm/9)}</div><div class="sub">9 aktif gün</div></div>
    <div class="card"><div class="label">Amaçsız kayıt</div><div class="val" style="color:var(--color-text-warning)">${amacsiz}</div><div class="sub">amaç girilmemiş</div></div>
  `;
}

function destroyChart(id){
  if(charts[id]){charts[id].destroy();delete charts[id];}
}

function renderGunluk(data){
  const byDay = {};
  data.forEach(r=>{byDay[r.tarih]=(byDay[r.tarih]||0)+r.km;});
  const days = Object.keys(byDay).sort((a,b)=>{
    const [da,ma,ya]=a.split('.').map(Number);
    const [db,mb,yb]=b.split('.').map(Number);
    return new Date(ya,ma-1,da)-new Date(yb,mb-1,db);
  });
  const labels = days.map(d=>d.replace('.2026',''));
  const vals = days.map(d=>byDay[d]);
  destroyChart('cGunluk');
  charts['cGunluk']=new Chart(document.getElementById('cGunluk'),{
    type:'bar',
    data:{labels,datasets:[{label:'Toplam km',data:vals,backgroundColor:'#3266ad',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,maxRotation:45,font:{size:11}}},y:{ticks:{font:{size:11}}}}}
  });
}

function renderSurucu(data){
  const bySurucu = {};
  data.forEach(r=>{bySurucu[r.surucu]=(bySurucu[r.surucu]||0)+r.km;});
  const labels = Object.keys(bySurucu);
  const vals = labels.map(l=>bySurucu[l]);
  const total = vals.reduce((a,b)=>a+b,0);
  const bgColors = labels.map(l=>COLORS[l]||'#888');
  document.getElementById('legSurucu').innerHTML = labels.map((l,i)=>`<span><i style="background:${bgColors[i]}"></i>${l} — ${bySurucu[l]} km (${Math.round(bySurucu[l]/total*100)}%)</span>`).join('');
  destroyChart('cSurucu');
  charts['cSurucu']=new Chart(document.getElementById('cSurucu'),{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:bgColors,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'60%'}
  });
}

function renderAmac(data){
  const byAmac = {};
  data.forEach(r=>{
    let a = (r.amac||'').trim()||'Belirtilmemiş';
    a = a.charAt(0).toUpperCase()+a.slice(1);
    byAmac[a]=(byAmac[a]||0)+r.km;
  });
  const sorted = Object.entries(byAmac).sort((a,b)=>b[1]-a[1]);
  const labels = sorted.map(x=>x[0]);
  const vals = sorted.map(x=>x[1]);
  const total = vals.reduce((a,b)=>a+b,0);
  const bgColors = ['#3266ad','#1d9e75','#d85a30','#5a3ab7','#ba7517','#888780','#d4537e','#378add','#639922'];
  document.getElementById('legAmac').innerHTML = labels.map((l,i)=>`<span><i style="background:${bgColors[i%bgColors.length]}"></i>${l} ${Math.round(vals[i]/total*100)}%</span>`).join('');
  destroyChart('cAmac');
  charts['cAmac']=new Chart(document.getElementById('cAmac'),{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:bgColors.slice(0,labels.length),borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{font:{size:10}}}}}
  });
}

function renderOrtalama(data){
  const byDay = {};
  data.forEach(r=>{
    if(!byDay[r.tarih])byDay[r.tarih]={km:0,n:0};
    byDay[r.tarih].km+=r.km;byDay[r.tarih].n++;
  });
  const days = Object.keys(byDay).sort((a,b)=>{
    const [da,ma,ya]=a.split('.').map(Number);
    const [db,mb,yb]=b.split('.').map(Number);
    return new Date(ya,ma-1,da)-new Date(yb,mb-1,db);
  });
  const labels = days.map(d=>d.replace('.2026',''));
  const vals = days.map(d=>Math.round(byDay[d].km/byDay[d].n));
  destroyChart('cOrtalama');
  charts['cOrtalama']=new Chart(document.getElementById('cOrtalama'),{
    type:'line',
    data:{labels,datasets:[{label:'Ort. km',data:vals,borderColor:'#d85a30',backgroundColor:'rgba(216,90,48,.08)',tension:.3,pointRadius:4,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,maxRotation:45,font:{size:11}}},y:{ticks:{font:{size:11}}}}}
  });
}

function renderAlerts(){
  const alerts = [];

  // Çift kayıtlar: aynı cikisKm değeri
  const cikisMap = {};
  RAW.forEach(r=>{
    const key = r.plaka+'-'+r.cikisKm;
    if(!cikisMap[key])cikisMap[key]=[];
    cikisMap[key].push(r);
  });
  Object.values(cikisMap).filter(v=>v.length>1).forEach(v=>{
    alerts.push({tip:'Çift kayıt tespit edildi',detay:`${v[0].plaka} — ${v[0].tarih} saat ${v[0].cikisSaat}, aynı çıkış km ile ${v.length} kayıt (ID: ${v.map(x=>x.id.slice(-6)).join(', ')})`});
  });

  // Amaçsız yüksek km seferler
  RAW.filter(r=>(!r.amac||r.amac.trim()==='')&&r.km>=80).forEach(r=>{
    alerts.push({tip:'Amaçsız yüksek km sefer',detay:`${r.plaka} — ${r.surucu}, ${r.tarih} ${r.cikisSaat}, ${r.km} km — kullanım amacı girilmemiş`});
  });

  // 1 km farkı olan gece geçişli seferler (çıkış akşam, dönüş sabah)
  RAW.filter(r=>{
    const ch = parseInt(r.cikisSaat.split(':')[0]);
    return ch >= 15;
  }).forEach(r=>{
    if(r.km > 80) alerts.push({tip:'Gece/akşam uzun sefer',detay:`${r.plaka} — ${r.surucu}, çıkış ${r.cikisSaat} tarih ${r.tarih}, ${r.km} km — ertesi gün dönüş`});
  });

  const box = document.getElementById('alerts');
  if(alerts.length===0){box.innerHTML='<div style="font-size:13px;color:var(--color-text-secondary);padding:.5rem 0">Dikkat gerektiren kayıt bulunmuyor.</div>';return;}
  box.innerHTML = alerts.map(a=>`<div class="alert-box"><div class="at">${a.tip}</div><div class="ad">${a.detay}</div></div>`).join('');
}

render();
</script>
